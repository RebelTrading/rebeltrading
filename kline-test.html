<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLineCharts Lifecycle Managed</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; }
        #chart { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>

    <div id="chart"></div>

    <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>
    <script>
        // Use a MutationObserver to ensure we initialize only when the DOM is 100% stable
        const observer = new MutationObserver((mutations, obs) => {
            const container = document.getElementById('chart');
            if (container && container.offsetWidth > 0 && container.offsetHeight > 0) {
                obs.disconnect(); // Stop watching
                initProfessionalChart(container);
            }
        });

        observer.observe(document.body, { childList: true, subtree: true });

        function initProfessionalChart(container) {
            const chart = klinecharts.init(container);
            
            chart.setSymbol({ ticker: 'BTC' });
            chart.setPeriod({ span: 1, type: 'day' });

            chart.setDataLoader({
                getBars: async ({ callback }) => {
                    try {
                        const response = await fetch('http://192.168.0.66:8000/api/prices');
                        const json = await response.json();
                        
                        // Mapping based on your documentation requirements
                        const data = (json.btc || []).map(item => ({
                            timestamp: Number(item.t),
                            open: Number(item.o),
                            high: Number(item.h),
                            low: Number(item.l),
                            close: Number(item.c),
                            volume: Number(item.v)
                        }));

                        callback(data, false);
                    } catch (e) {
                        console.error("Lifecycle Load Failed:", e);
                        callback([], false);
                    }
                }
            });
            
            // Per docs: Force resize if layout shifts
            window.addEventListener('resize', () => chart.resize());
        }
    </script>
</body>
</html>
