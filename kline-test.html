<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLineChart Live Test</title>
  <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/umd/klinecharts.min.js"></script>
  <style>
    body { margin:0; padding:20px; background:#0a0a0a; color:#ddd; font-family:Arial, sans-serif; }
    #chart { width:100%; max-width:1400px; height:720px; margin:20px auto; border:2px solid #444; background:#000; }
    button { padding:10px 20px; margin:5px; background:#222; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
    button.active { background:#ff2a2a; }
    #status { text-align:center; margin:10px; color:#0f0; }
  </style>
</head>
<body>
  <h1>KLineChart Live Test (BTC/ETH/SOL/XRP)</h1>
  
  <div>
    <button onclick="switchSymbol('BTC')" class="active" id="btn-BTC">BTC</button>
    <button onclick="switchSymbol('ETH')" id="btn-ETH">ETH</button>
    <button onclick="switchSymbol('SOL')" id="btn-SOL">SOL</button>
    <button onclick="switchSymbol('XRP')" id="btn-XRP">XRP</button>
  </div>

  <div id="status">Connecting to live price feed...</div>
  <div id="chart"></div>

  <script>
    let chart = null;
    let currentSymbol = 'BTC';
    let priceInterval = null;
    let lastPrice = 65000;

    function generateInitialBars(basePrice) {
      const now = Date.now();
      const bars = [];
      let price = basePrice;
      for (let i = 250; i >= 0; i--) {
        const ts = now - i * 60000;
        const open = price;
        const close = open + (Math.random() * 380 - 190);
        const high = Math.max(open, close) + Math.random() * 220;
        const low = Math.min(open, close) - Math.random() * 220;

        bars.push({
          timestamp: ts,
          open: Number(open.toFixed(2)),
          high: Number(high.toFixed(2)),
          low: Number(low.toFixed(2)),
          close: Number(close.toFixed(2)),
          volume: Math.floor(Math.random() * 18000) + 2500
        });
        price = close;
      }
      return bars;
    }

    function initChart() {
      if (chart) klinecharts.dispose('chart');

      chart = klinecharts.init('chart');

      chart.setSymbol({ ticker: currentSymbol + '/USD' });
      chart.setPeriod({ span: 1, type: 'minute' });

      chart.createIndicator('EMA', false, { calcParams: [9] });
      chart.createIndicator('EMA', false, { calcParams: [21] });
      chart.createIndicator('VOLUME', true);
      chart.createIndicator('MACD', true);
      chart.createIndicator('RSI', true);

      const basePrices = { BTC: 79130, ETH: 3450, SOL: 145, XRP: 1.43 };
      const bars = generateInitialBars(basePrices[currentSymbol] || 65000);

      chart.setDataLoader({
        getBars: ({ callback }) => callback(bars)
      });

      console.log(`✅ Loaded initial bars for ${currentSymbol}`);
    }

    // Fetch live price and update the last candle
    async function updateLivePrice() {
      try {
        const res = await fetch('http://192.168.0.66:8000/api/prices');
        const priceMatrix = await res.json();

        const apiKey = currentSymbol + '-USD';  // matches your tradesim.html
        let newPrice = priceMatrix[apiKey] || lastPrice;

        if (typeof newPrice === 'number' && newPrice > 0) {
          lastPrice = newPrice;

          // Update the last (current) candle
          const now = Date.now();
          const lastBar = {
            timestamp: Math.floor(now / 60000) * 60000, // current minute
            open: lastPrice,   // simplify for demo
            high: lastPrice + Math.random() * 20,
            low: lastPrice - Math.random() * 20,
            close: lastPrice,
            volume: Math.floor(Math.random() * 5000) + 1000
          };

          if (chart) {
            chart.updateData(lastBar);
          }

          document.getElementById('status').innerHTML = 
            `Live ${currentSymbol}: <strong>$${lastPrice.toFixed(2)}</strong> (updating)`;
        }
      } catch (e) {
        console.warn('Live API failed (normal on GitHub Pages):', e.message);
        document.getElementById('status').innerHTML = 'Live API unavailable — using mock movement';
        
        // Fake small movement when API not reachable
        lastPrice += (Math.random() - 0.5) * 15;
        if (chart) chart.updateData({
          timestamp: Math.floor(Date.now() / 60000) * 60000,
          open: lastPrice,
          high: lastPrice + 10,
          low: lastPrice - 10,
          close: lastPrice,
          volume: 5000
        });
      }
    }

    window.switchSymbol = function(symbol) {
      currentSymbol = symbol;
      document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${symbol}`).classList.add('active');
      initChart();
      updateLivePrice(); // immediate update
    };

    window.onload = function() {
      initChart();
      updateLivePrice();
      
      // Update every 1 second (like your tradesim.html)
      if (priceInterval) clearInterval(priceInterval);
      priceInterval = setInterval(updateLivePrice, 1000);
    };
  </script>
</body>
</html>
