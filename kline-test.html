<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLineCharts Integration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; }
        #chart { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chart"></div>

    <script>
        // 1. Initialize
        const chart = klinecharts.init('chart');

        // 2. Set Symbol & Period (Required for Data Loader to trigger)
        chart.setSymbol({ ticker: 'BTC' });
        chart.setPeriod({ span: 1, type: 'day' });

        // 3. Normalization Helper (Crucial for KLineCharts field format)
        function normalizeToKLineData(item) {
            return {
                timestamp: Number(item.t), // Ensure milliseconds
                open: Number(item.o),
                high: Number(item.h),
                low: Number(item.l),
                close: Number(item.c),
                volume: Number(item.v || 0)
            };
        }

        // 4. Implement the Data Loader per the official GitHub docs
        chart.setDataLoader({
            getBars: async ({ type, timestamp, callback }) => {
                try {
                    // Fetch your data
                    const response = await fetch('http://192.168.0.66:8000/api/prices');
                    const rawData = await response.json();
                    
                    // Access the array (Modify 'btc' to the correct key from your console)
                    const sourceArray = rawData.btc || [];

                    // Normalize data
                    const bars = sourceArray.map(normalizeToKLineData)
                        .sort((a, b) => a.timestamp - b.timestamp);

                    console.log(`[KLine] Data Loaded: ${bars.length} bars. Type: ${type}`);

                    // Use callback(data, more)
                    // If your API returns all data at once, 'more' is false.
                    callback(bars, false);

                } catch (e) {
                    console.error("[KLine] Data Loading Error:", e);
                    callback([], false);
                }
            }
        });
    </script>
</body>
</html>
