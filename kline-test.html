<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLineCharts Official Pattern</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>
    <style>
        body { margin: 0; background: #000; }
        #chart { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chart"></div>

    <script>
        // Initialize as per documentation
        const chart = klinecharts.init('chart');

        // Set symbol and period
        chart.setSymbol({ ticker: 'BTC' });
        chart.setPeriod({ span: 1, type: 'day' });

        // Add indicators as requested
        chart.createIndicator('MACD');
        chart.createIndicator('RSI');
        chart.createIndicator('EMA', true, { id: 'candle_pane' });

        // Use the official setDataLoader pattern
        chart.setDataLoader({
            getBars: async ({ callback }) => {
                try {
                    const response = await fetch('http://192.168.0.66:8000/api/prices');
                    const rawData = await response.json();

                    // Debug: See the structure in console
                    console.log("API Response for Loader:", rawData);

                    // Adjust this 'rawData.btc' to match your actual API data structure
                    const dataArray = rawData.btc; 

                    const formattedData = dataArray.map(item => ({
                        timestamp: item.t,
                        open: item.o,
                        high: item.h,
                        low: item.l,
                        close: item.c,
                        volume: item.v
                    }));

                    // Return the data to the chart via callback
                    callback(formattedData);
                } catch (error) {
                    console.error("Data Load Error:", error);
                    callback([]);
                }
            }
        });
    </script>
</body>
</html>
