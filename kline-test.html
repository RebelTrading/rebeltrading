<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>
    <style>
        #chart { width: 100%; height: 600px; background: #000; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        const chart = klinecharts.init('chart');
        
        // Add Indicators as per docs
        chart.createIndicator('MACD');
        chart.createIndicator('RSI');
        chart.createIndicator('EMA', true, { id: 'candle_pane' });

        // THE KLINECHARTS DATA LOADER PATTERN
        chart.setDataLoader({
            getBars: async ({ callback }) => {
                try {
                    const response = await fetch('http://192.168.0.66:8000/api/prices');
                    const rawData = await response.json();
                    
                    // You mentioned this fetch works in tradesim.html.
                    // If the response is an object, access the array here.
                    const data = Array.isArray(rawData) ? rawData : rawData.btc;

                    const formatted = data.map(item => ({
                        timestamp: item.t,
                        open: item.o,
                        high: item.h,
                        low: item.l,
                        close: item.c,
                        volume: item.v
                    }));
                    
                    callback(formatted);
                } catch (e) {
                    console.error("KLineCharts loader error:", e);
                    callback([]);
                }
            }
        });
    </script>
</body>
</html>
