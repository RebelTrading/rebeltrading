<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLineCharts Isolated Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>
    <style>
        body { margin: 0; background: #000; }
        #chart { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        const chart = klinecharts.init('chart');
        
        // Add the indicators you requested
        chart.createIndicator('EMA', true, { id: 'candle_pane' });
        chart.createIndicator('MACD');
        chart.createIndicator('RSI');
        chart.createIndicator('VOL');

        async function fetchPrices() {
            try {
                const response = await fetch('http://192.168.0.66:8000/api/prices');
                const rawData = await response.json();
                
                // IMPORTANT: Use the key from your existing tradesim.html logic.
                // If it's { "btc": [...] }, use rawData.btc
                const arrayData = rawData.btc; 

                const formatted = arrayData.map(item => ({
                    timestamp: item.t,
                    open: item.o,
                    high: item.h,
                    low: item.l,
                    close: item.c,
                    volume: item.v
                }));

                chart.applyNewData(formatted);
            } catch (e) { 
                console.error("API error. Check if 'btc' is the correct object key:", e); 
            }
        }

        fetchPrices();
    </script>
</body>
</html>
