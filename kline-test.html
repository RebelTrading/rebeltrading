<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLineChart Live Test</title>
  <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/umd/klinecharts.min.js"></script>
  <style>
    body { margin:0; padding:20px; background:#0a0a0a; color:#ddd; font-family:Arial, sans-serif; }
    #chart { width:100%; max-width:1400px; height:780px; margin:20px auto; border:2px solid #444; background:#000; }
    .controls { text-align:center; margin-bottom:15px; }
    button { padding:10px 20px; margin:5px; background:#222; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
    button.active { background:#ff2a2a; }
    #status { text-align:center; margin:10px; color:#0f0; font-family:monospace; font-size:1.1em; }
  </style>
</head>
<body>
  <h1>KLineChart Live Test (BTC/ETH/SOL/XRP)</h1>
  
  <div class="controls">
    <button onclick="switchSymbol('BTC')" class="active" id="btn-BTC">BTC</button>
    <button onclick="switchSymbol('ETH')" id="btn-ETH">ETH</button>
    <button onclick="switchSymbol('SOL')" id="btn-SOL">SOL</button>
    <button onclick="switchSymbol('XRP')" id="btn-XRP">XRP</button>
  </div>

  <div id="status">Connecting to live price feed...</div>
  <div id="chart"></div>

  <script>
    let chart = null;
    let currentSymbol = 'BTC';
    let priceInterval = null;
    let barsCache = [];

    function generateInitialBars(basePrice) {
      const now = Date.now();
      const bars = [];
      let price = basePrice;
      for (let i = 300; i >= 0; i--) {
        const ts = now - i * 60000;
        const open = price;
        const close = open + (Math.random() * 380 - 190);
        const high = Math.max(open, close) + Math.random() * 220;
        const low = Math.min(open, close) - Math.random() * 220;

        bars.push({
          timestamp: ts,
          open: Number(open.toFixed(2)),
          high: Number(high.toFixed(2)),
          low: Number(low.toFixed(2)),
          close: Number(close.toFixed(2)),
          volume: Math.floor(Math.random() * 18000) + 2500
        });
        price = close;
      }
      return bars;
    }

    function initChart() {
      if (chart) klinecharts.dispose('chart');

      chart = klinecharts.init('chart', {
        styles: { candle: { type: 'candle' } }
      });

      chart.setSymbol({ ticker: currentSymbol + '/USD' });
      chart.setPeriod({ span: 1, type: 'minute' });

      // === CORRECT INDICATOR PLACEMENT ===
      chart.createIndicator('EMA', true, { calcParams: [9] });   // Overlay on main pane
      chart.createIndicator('EMA', true, { calcParams: [21] });  // Overlay on main pane
      chart.createIndicator('VOLUME', true);                     // Separate pane
      chart.createIndicator('MACD', true);                       // Separate pane
      chart.createIndicator('RSI', true);                        // Separate pane

      const basePrices = { BTC: 79130, ETH: 3450, SOL: 145, XRP: 1.43 };
      barsCache = generateInitialBars(basePrices[currentSymbol] || 65000);

      chart.setDataLoader({ getBars: ({ callback }) => callback(barsCache) });
      console.log(`✅ Loaded ${barsCache.length} bars for ${currentSymbol}`);
    }

    async function updateLivePrice() {
      try {
        const res = await fetch('http://192.168.0.66:8000/api/prices');
        const priceMatrix = await res.json();

        const apiKey = currentSymbol + '-USD';
        let newPrice = priceMatrix[apiKey];

        if (typeof newPrice === 'number' && newPrice > 0) {
          const lastBar = barsCache[barsCache.length - 1];
          const now = Date.now();
          const currentMinute = Math.floor(now / 60000) * 60000;

          if (lastBar.timestamp === currentMinute) {
            lastBar.high = Math.max(lastBar.high || lastBar.close, newPrice);
            lastBar.low = Math.min(lastBar.low || lastBar.close, newPrice);
            lastBar.close = newPrice;
            lastBar.volume = (lastBar.volume || 0) + 200;
          } else {
            barsCache.push({
              timestamp: currentMinute,
              open: newPrice,
              high: newPrice,
              low: newPrice,
              close: newPrice,
              volume: 1000
            });
          }

          chart.setDataLoader({ getBars: ({ callback }) => callback(barsCache) });

          document.getElementById('status').innerHTML = `Live ${currentSymbol}: <strong>$${newPrice.toFixed(2)}</strong>`;
        }
      } catch (e) {
        console.warn('Live API failed:', e.message);
        document.getElementById('status').innerHTML = 'Live API unavailable — mock movement';
        
        // Fake live movement
        const lastBar = barsCache[barsCache.length - 1];
        lastBar.close += (Math.random() - 0.5) * 35;
        lastBar.high = Math.max(lastBar.high, lastBar.close);
        lastBar.low = Math.min(lastBar.low, lastBar.close);
        chart.setDataLoader({ getBars: ({ callback }) => callback(barsCache) });
      }
    }

    window.switchSymbol = function(symbol) {
      currentSymbol = symbol;
      document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${symbol}`).classList.add('active');
      initChart();
      updateLivePrice();
    };

    window.onload = function() {
      initChart();
      updateLivePrice();
      if (priceInterval) clearInterval(priceInterval);
      priceInterval = setInterval(updateLivePrice, 1500);
    };
  </script>
</body>
</html>
