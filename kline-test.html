<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLineCharts Pro Setup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.css" />
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #000;">

    <div id="chart" style="width: 100vw; height: 100vh;"></div>

    <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>

    <script>
        // DOMContentLoaded ensures the container exists before KLineCharts touches it
        window.addEventListener('DOMContentLoaded', () => {
            
            const chart = klinecharts.init('chart');

            // 1. Mandatory metadata
            chart.setSymbol({ ticker: 'BTC' });
            chart.setPeriod({ span: 1, type: 'day' });

            // 2. Data Loader
            chart.setDataLoader({
                getBars: async ({ callback }) => {
                    try {
                        const response = await fetch('http://192.168.0.66:8000/api/prices');
                        const data = await response.json();
                        
                        // Debugging: THIS WILL SHOW YOU IF THE DATA IS ACTUALLY ARRIVING
                        console.log("DEBUG API DATA:", data);

                        // If data.btc is undefined, THIS is your blank chart cause.
                        const rawArray = data.btc || []; 

                        const formatted = rawArray.map(item => ({
                            timestamp: Number(item.t),
                            open: Number(item.o),
                            high: Number(item.h),
                            low: Number(item.l),
                            close: Number(item.c),
                            volume: Number(item.v)
                        }));

                        callback(formatted, false);
                    } catch (e) {
                        console.error("KLineCharts Error:", e);
                        callback([], false);
                    }
                }
            });

            // 3. Force Resize (CRITICAL: prevents blank/black initialization)
            window.addEventListener('resize', () => {
                chart.resize();
            });
        });
    </script>
</body>
</html>
