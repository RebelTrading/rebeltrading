<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rebel Trading Sim</title>
    <style>
        body { 
            background-color: #0b0b0b; 
            margin: 0; 
            padding: 10px; 
            font-family: sans-serif; 
            color: #bdbdbd; 
            overflow: hidden;
        }
        #toolbar { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 10px; 
            align-items: center; 
            height: 30px;
        }
        button { 
            background: #222; 
            color: #fff; 
            border: 1px solid #444; 
            padding: 6px 12px; 
            cursor: pointer; 
            border-radius: 4px; 
        }
        button.active { 
            background: #00ff66; 
            color: #000; 
            font-weight: bold; 
            border-color: #00ff66; 
        }
        label { 
            margin-left: 10px; 
            display: inline-flex; 
            align-items: center; 
            gap: 4px; 
        }
        
        /* Master layout architecture split into rows */
        #workspace {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: calc(100vh - 60px);
            gap: 5px;
        }
        .chart-row {
            width: 100%;
            background: #0b0b0b;
            transition: height 0.1s ease;
        }
        #main-container { height: 60%; }
        #rsi-container { height: 20%; display: none; }
        #macd-container { height: 20%; display: block; } /* Matches checked state in toolbar */
    </style>
</head>
<body>

    <div id="toolbar">
        <button class="tf-btn active" data-tf="1m">1M</button>
        <button class="tf-btn" data-tf="5m">5M</button>
        <button class="tf-btn" data-tf="1h">1H</button>
        <button class="tf-btn" data-tf="1d">1D</button>
        |
        <button class="asset-btn active" data-asset="BTC">BTC/USD</button>
        <button class="asset-btn" data-asset="ETH">ETH/USD</button>
        <button class="asset-btn" data-asset="SOL">SOL/USD</button>
        <button class="asset-btn" data-asset="XRP">XRP/USD</button>
        |
        <label><input type="checkbox" id="toggle-ema9"> 9 EMA</label>
        <label><input type="checkbox" id="toggle-ema21"> 21 EMA</label>
        <label><input type="checkbox" id="toggle-ema100"> 100 EMA</label>
        <label><input type="checkbox" id="toggle-ema200"> 200 EMA</label>
        <label><input type="checkbox" id="toggle-vwap"> VWAP</label>
        <label><input type="checkbox" id="toggle-volume"> Volume</label>
        <label><input type="checkbox" id="toggle-rsi"> RSI</label>
        <label><input type="checkbox" id="toggle-macd" checked> MACD</label>
    </div>

    <div id="workspace">
        <div id="main-container" class="chart-row"></div>
        <div id="rsi-container" class="chart-row"></div>
        <div id="macd-container" class="chart-row"></div>
    </div>

    <script type="module" src="./chart-app.js"></script>
</body>
</html>
