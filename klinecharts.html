<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLineCharts Test</title>
    <!-- Include KLineCharts library from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>
    <style>
        #chart { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        // 1. Initialize the chart
        const chart = klinecharts.init('chart');

        // 2. Add technical indicators (No math needed)
        chart.createIndicator('MACD', false);
        chart.createIndicator('RSI', false);

        // 3. Dummy data to test the display
        const data = [
            { timestamp: 1716000000000, open: 40000, high: 40100, low: 39900, close: 40050, volume: 100 },
            { timestamp: 1716003600000, open: 40050, high: 40200, low: 40000, close: 40150, volume: 150 }
        ];

        // 4. Feed data to the chart
        chart.applyNewData(data);
    </script>
</body>
</html>
