<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLineCharts Test</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.css" />
    
    <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>
    
    <style>
        /* 3. The container MUST have an explicit height */
        #chart { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <div id="chart"></div>

    <script>
        // Wait for the DOM to be fully loaded
        window.addEventListener('DOMContentLoaded', () => {
            // Initialize
            const chart = klinecharts.init('chart');
            
            // Add indicators
            chart.createIndicator('MACD');
            chart.createIndicator('RSI');

            // Set some dummy data to verify it works
            chart.applyNewData([
                { timestamp: 1716000000000, open: 40000, high: 40100, low: 39900, close: 40050, volume: 100 },
                { timestamp: 1716003600000, open: 40050, high: 40200, low: 40000, close: 40150, volume: 150 }
            ]);
        });
    </script>
</body>
</html>
