<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLineCharts Live Test</title>
    <!-- Use the latest version -->
    <script src="https://unpkg.com/klinecharts/dist/klinecharts.min.js"></script>
    <style>
        #chart { width: 100%; height: 600px; background-color: #131722; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        // 1. Initialize
        const chart = klinecharts.init('chart');
        chart.createIndicator('MACD');
        chart.createIndicator('RSI');

        // 2. Fetch from your Beelink server
        async function fetchPrices() {
            try {
                const response = await fetch('http://192.168.0.66:8000/api/prices');
                const rawData = await response.json();

                // 3. Transform: Ensure data is mapped to {timestamp, open, high, low, close, volume}
                // Assuming your API returns something like {btc: {o, h, l, c, v, t}, ...}
                // Adjust 'rawData.btc' to match the actual key in your JSON
                const formattedData = rawData.btc.map(item => ({
                    timestamp: item.t,
                    open: item.o,
                    high: item.h,
                    low: item.l,
                    close: item.c,
                    volume: item.v
                }));

                // 4. Load data into the chart
                chart.setSeries(formattedData);
            } catch (err) {
                console.error("Failed to fetch price data:", err);
            }
        }

        // Run it
        fetchPrices();
    </script>
</body>
</html>
