<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLineCharts Test</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.css" />
    
    <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>
    
    <style>
        #chart { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <div id="chart"></div>

    <script>
        // Initialize
        const chart = klinecharts.init('chart');
        
        // Add Indicators
        chart.createIndicator('MACD');
        chart.createIndicator('RSI');

        // Fetch Data
        fetch('http://192.168.0.66:8000/api/prices')
            .then(response => response.json())
            .then(data => {
                // Assuming data is an array directly: [{t, o, h, l, c, v}, ...]
                const formattedData = data.map(item => ({
                    timestamp: item.t,
                    open: item.o,
                    high: item.h,
                    low: item.l,
                    close: item.c,
                    volume: item.v
                }));
                
                chart.applyNewData(formattedData);
            })
            .catch(err => {
                console.error("Fetch failed. Open console for details.");
            });
    </script>
</body>
</html>
